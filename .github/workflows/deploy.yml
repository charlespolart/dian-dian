name: Deploy

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to deploy (latest = HEAD short SHA, or pass a 7-char SHA to roll back)"
        required: false
        default: latest

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
      image_name: ${{ steps.meta.outputs.image_name }}
    steps:
      - uses: actions/checkout@v4

      - id: meta
        env:
          OWNER: ${{ github.repository_owner }}
        run: |
          if [ "${{ github.event.inputs.tag }}" = "latest" ]; then
            echo "tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi
          owner_lc="${OWNER,,}"  # GHCR requires lowercase
          echo "image_name=ghcr.io/${owner_lc}/dian-dian-backend" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          target: runtime
          push: true
          tags: |
            ${{ steps.meta.outputs.image_name }}:${{ steps.meta.outputs.tag }}
            ${{ steps.meta.outputs.image_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync compose + Caddyfile
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          # No --delete — anything outside the repo on the VPS (postgres data
          # dir, caddy volumes, .env) must survive.
          rsync -az -e 'ssh -i ~/.ssh/id_deploy' \
            ops/docker-compose.yml \
            ops/docker-compose.prod.yml \
            "$VPS_USER@$VPS_HOST:/srv/dian-dian/ops/"

          # Caddyfile via cat > to preserve the inode of the bind mount.
          # The Caddy container holds onto the file via the original inode;
          # replacing the file (rsync would) leaves the container serving
          # the old config until a restart.
          scp -i ~/.ssh/id_deploy ops/Caddyfile \
            "$VPS_USER@$VPS_HOST:/tmp/dian-dian-Caddyfile"
          ssh -i ~/.ssh/id_deploy "$VPS_USER@$VPS_HOST" \
            "mkdir -p /srv/dian-dian/ops && cat /tmp/dian-dian-Caddyfile > /srv/dian-dian/ops/Caddyfile && rm /tmp/dian-dian-Caddyfile"

      - name: Pull image, migrate, restart
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          # Quoted heredoc → no local expansion. IMAGE_TAG is passed inline
          # so the remote shell sees it expanded once.
          ssh -i ~/.ssh/id_deploy "$VPS_USER@$VPS_HOST" \
            "IMAGE_TAG='$IMAGE_TAG' bash -s" << 'REMOTE'
          set -euo pipefail
          cd /srv/dian-dian
          echo "$IMAGE_TAG" > .deployed-tag

          COMPOSE="docker compose --env-file /srv/dian-dian/.env \
            -f ops/docker-compose.yml \
            -f ops/docker-compose.prod.yml"

          IMAGE_TAG="$IMAGE_TAG" $COMPOSE pull backend
          IMAGE_TAG="$IMAGE_TAG" $COMPOSE up -d --wait postgres

          # Migrate with 3× retry: pg_filenode.map races with concurrent DDL
          # can fail the first attempt right after postgres starts.
          for attempt in 1 2 3; do
            if IMAGE_TAG="$IMAGE_TAG" $COMPOSE run --rm --no-deps -T backend npx drizzle-kit migrate </dev/null; then
              break
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "migrate failed 3 times, aborting"
              exit 1
            fi
            sleep 5
          done

          IMAGE_TAG="$IMAGE_TAG" $COMPOSE up -d --wait

          # Reload Caddy in place — the Caddyfile may have changed.
          $COMPOSE exec -T caddy caddy validate --config /etc/caddy/Caddyfile
          $COMPOSE exec -T caddy caddy reload --config /etc/caddy/Caddyfile

          docker image prune -f
          REMOTE
