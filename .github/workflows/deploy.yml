name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
        run: |
          SSH_CMD="ssh -i ~/.ssh/id_deploy $VPS_USER@$VPS_HOST"
          SCP_CMD="scp -i ~/.ssh/id_deploy"
          RSYNC="rsync -az -e 'ssh -i ~/.ssh/id_deploy'"

          $SSH_CMD "mkdir -p /root/dian-dian/backend"

          # Backend source (Dockerfile builds it inside the image; we sync
          # everything except node_modules / dist / .env which are produced or
          # injected at runtime).
          eval "$RSYNC --delete \
            --exclude=node_modules --exclude=dist --exclude=.env \
            backend/ $VPS_USER@$VPS_HOST:/root/dian-dian/backend/"

          # Top-level orchestration files
          $SCP_CMD Caddyfile $VPS_USER@$VPS_HOST:/root/dian-dian/Caddyfile
          $SCP_CMD compose.yaml $VPS_USER@$VPS_HOST:/root/dian-dian/compose.yaml

          $SSH_CMD << 'REMOTE'
            set -e

            # First-run bootstrap: install Docker + Compose v2 if absent.
            if ! command -v docker >/dev/null 2>&1; then
              echo "Installing Docker..."
              curl -fsSL https://get.docker.com | sh
              sudo systemctl enable --now docker
            fi

            cd /root/dian-dian

            sudo docker compose build backend
            sudo docker compose up -d postgres caddy backend

            # Wait for backend to be ready, then run migrations inside the container.
            sleep 2
            sudo docker compose exec -T backend npx drizzle-kit migrate

            sudo docker compose exec -T caddy caddy validate --config /etc/caddy/Caddyfile
            sudo docker compose exec -T caddy caddy reload --config /etc/caddy/Caddyfile
          REMOTE
