# Dev overlay — build target=development with source bind-mount for hot
# reload, postgres exposed on loopback for native dev (tsx outside Docker),
# named volume so wiping `/var/lib/docker/volumes/dian-dian_*` is intentional.
#
# Usage:  docker compose -f ops/docker-compose.yml -f ops/docker-compose.dev.yml up
services:
  postgres:
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: development
    environment:
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-please}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      APP_URL: ${APP_URL:-http://localhost:3001}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8081}
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      # node_modules stay in the image; mount only the source for hot reload.
      - ../backend/src:/app/src:delegated
      - ../backend/drizzle.config.ts:/app/drizzle.config.ts:delegated
      - ../backend/drizzle:/app/drizzle:delegated

volumes:
  postgres_data:
    name: dian-dian_postgres_data
